<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ProjectTracker Mobile</title>
    
    <!-- PWA / iOS Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tracker">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-touch-fullscreen" content="yes">
    <meta name="format-detection" content="telephone=no">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icon.png">
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#10b981">

    <!-- Styles & Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Horná lišta -->
    <header class="mobile-header">
        <h1 id="mobileTitle">Moje projekty</h1>
        <div style="display: flex; align-items: center; gap: 0.5rem; flex-wrap: nowrap;">
            <button id="syncNowBtn" onclick="App.syncNow()" class="m-sync-button-compact">
                <i class="fas fa-sync-alt" id="syncIcon"></i>
                <span>SYNCHRONIZOVAŤ</span>
            </button>
            <div id="connectionStatus" class="m-status-pill">
                <span id="statusDot" style="display: block; width: 6px; height: 6px; background: #ef4444; border-radius: 50%;"></span>
                <span id="statusText">Off</span>
            </div>
        </div>
    </header>

    <!-- Hlavný obsah -->
    <main id="mainArea" class="content-area">
        <!-- Sem sa renderuje obsah -->
    </main>

    <!-- Spodná navigácia -->
    <nav class="bottom-nav">
        <button class="nav-item active" onclick="App.navigate('dashboard')" data-page="dashboard">
            <i class="fas fa-th-large"></i>
            <span>Prehľad</span>
        </button>
        <button class="nav-item" onclick="App.navigate('add')" data-page="add">
            <i class="fas fa-plus-circle"></i>
            <span>Pridať</span>
        </button>
        <button class="nav-item" onclick="App.navigate('projects')" data-page="projects">
            <i class="fas fa-list-ul"></i>
            <span>Zoznam</span>
        </button>
    </nav>

    <!-- Modálne okno pre detaily (vysúvacie zdola) -->
    <div id="bottomSheet" class="bottom-sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-content" id="sheetContent"></div>
    </div>
    <div id="overlay" class="overlay" onclick="App.hideSheet()"></div>

    <!-- Skripty -->
    <script src="./../shared/store.js"></script>
    <script src="./../shared/projects.js"></script>
    <script src="./../shared/ui-helpers.js"></script>
    <script src="./../shared/task-helpers.js"></script>
    <script src="./app.js"></script>
</body>
</html>
